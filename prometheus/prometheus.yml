global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "employee-backend"

    static_configs:
      - targets: ["backend:5000"]
  - job_name: 'node-exporter'

    static_configs:
      - targets:
          - node-exporter:9100
  - job_name: "postgres-exporter"

    static_configs:
      - targets:
        - postgres-exporter:9187
  - job_name: "redis-exporter"

    static_configs:
      - targets:
        - redis-exporter:9121
