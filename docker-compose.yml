services:
  backend:
    build:
      context: ./backend

    container_name: employee-backend

    ports:
      - "5001:5000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    container_name: employee-postgres

    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: employee123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: employee-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

  prometheus:
    image: prom/prometheus:latest

    container_name: employee-prometheus

    ports:
      - "9090:9090"

    restart: unless-stopped

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    depends_on:
      - backend
  grafana:
    image: grafana/grafana:latest

    container_name: employee-grafana

    ports:
      - "3000:3000"

    restart: unless-stopped

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus
  node-exporter:
    image: prom/node-exporter:latest
    container_name: employee-node-exporter
    restart: unless-stopped

    ports:
      - "9100:9100"

    command:
      - '--path.rootfs=/host'

    pid: host

    volumes:
      - '/:/host:ro,rslave'
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: employee-postgres-exporter
    restart: always

    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/employee_db?sslmode=disable"

    ports:
      - "9187:9187"

    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: employee-redis-exporter
    restart: always

    environment:
      REDIS_ADDR: redis://redis:6379

    ports:
      - "9121:9121"

    depends_on:
      - redis
volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
